# FinPulse gateway — single public entry point.
#   /api/*  → php-fpm (api service) via FastCGI
#   /*      → web service (static SPA)
# The ai-worker is internal only; the api talks to it over the compose network.

server {
    listen 80;
    server_name _;

    # ── Core API (PHP-FPM) ────────────────────────────────────────────────
    location /api/ {
        fastcgi_pass  api:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        # Preserve the real client IP for the rate-limiter.
        fastcgi_param HTTP_X_REAL_IP  $remote_addr;
    }

    # ── Web frontend ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://web:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
