<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinPulse — financial assistant with BACEN data + AI</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="hero">
      <h1>FinPulse</h1>
      <p>Ask about finance and get answers backed by <strong>real Central Bank data</strong> + AI.</p>
    </header>

    <main>
      <section class="indicators">
        <h2>Indicators</h2>
        <div id="indicators" class="cards">Loading…</div>
      </section>

      <section class="chat">
        <h2>Ask something</h2>
        <form id="ask-form">
          <input id="question" type="text" autocomplete="off"
                 placeholder="e.g. how much does 10 thousand in savings yield in 1 year?" />
          <button type="submit">Ask</button>
        </form>
        <div id="answer" class="answer"></div>
      </section>
    </main>

    <footer>
      <small>Portfolio project · public BACEN SGS data · pluggable AI</small>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
