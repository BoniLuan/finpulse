<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinPulse — financial assistant with BACEN data + AI</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="hero">
      <span class="badge">✨ Real Central Bank data + AI</span>
      <h1>FinPulse</h1>
      <p>Ask anything about Brazilian finance and get a clear, AI-explained
         answer backed by live BACEN data.</p>
    </header>

    <main>
      <section class="indicators">
        <h2>Live indicators</h2>
        <div id="indicators" class="cards"></div>
      </section>

      <section class="chat">
        <h2>Ask something</h2>
        <div class="panel">
          <form id="ask-form">
            <input id="question" type="text" autocomplete="off"
                   placeholder="e.g. how much does 10 thousand in savings yield in 1 year?" />
            <button type="submit">Ask</button>
          </form>
          <div id="chips" class="chips"></div>
          <div id="answer" class="answer"></div>
        </div>
      </section>
    </main>

    <footer>
      <small>Portfolio project · public BACEN SGS data · pluggable AI ·
        <a href="https://github.com/BoniLuan/finpulse" target="_blank" rel="noopener">source on GitHub</a></small>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
