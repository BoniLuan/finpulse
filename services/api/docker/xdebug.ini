; Xdebug 3 — step debugging settings (the extension itself is loaded by
; docker-php-ext-enable). The active mode is controlled by the XDEBUG_MODE env
; var: "debug" in dev (docker-compose.override.yml), "off" everywhere else.
xdebug.mode=off
xdebug.start_with_request=yes
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.idekey=finpulse
xdebug.log_level=0
